<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <h1 th:text="${title}"></h1>

    <form th:action="@{/ticket/update-ticket}" th:object="${ticket}" method="post">
        
        <input type="hidden" name="ticketId" th:value="${ticketId}">

        <p th:text="*{id}"> id del ticket</p>
        <div>
            <select th:field="*{prioridad.id}">
                <option value="">Seleccion alguna prioridad para el ticket</option>
                <option th:each="est: ${estadoPrioridad}"
                        th:value="${est.id}"
                        th:text="${est.prioridad}">
                </option>
            </select>
        </div>

        <button type="submit">Actualizar ticket</button>
        
    </form>
</body>
</html>
