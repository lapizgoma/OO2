<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <h1>Lista de Tickets Filtrados</h1>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Asunto</th>
                <th>Estado</th>
                <th>Cliente</th>
                <th>Intervenciones</th>
                <th>Empleados</th>
                <th>Prioridad</th> 
                <th>Fecha</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ticket : ${tickets}">
                <td th:text="${ticket.id}"></td>
                <td th:text="${ticket.asunto}"></td>
                <td th:text="${ticket.estado.estado}"></td>
                <td th:text="${ticket.creadoPor == null ? 'Sin asignar' : ticket.creadoPor.nombre + ' ' + ticket.creadoPor.apellido}"></td>
                <td>
                    <ul>
                        <li th:each="interv : ${ticket.lstIntervencion}"
                            th:text="${interv.descripcion + ' (' + interv.estado.estado + ')'}">
                        </li>
                    </ul>
                </td>
                <td th:each="empleado, iterStat : ${ticket.listEmpleado}"th:text="${empleado.contacto.email} + ${!iterStat.last ? ', ' : ''}"></td>
                <td th:text="${ticket.prioridad == null ? 'Sin prioridad' : ticket.prioridad.prioridad}"></td>
                <td th:text="${ticket.fechaHora}"></td>
            </tr>
        </tbody>
    </table>

    <a href="/ticket/form-filtrar-tickets">Volver a filtros</a>
</body>
</html>
