<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear intervencion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    
    <h1>Crear intervencion</h1>
    <form th:action="@{/intervencion/create}" th:object="${intervencion}" method="post">
        <input type="hidden" th:field="*{ticketId}" />

        <div>
            <label for="descripcion">Descripcion</label>
            <input type="text" th:field="*{descripcion}">
        </div>

        <select th:field="*{estado}">
            <option value="">Seleccione un estado</option>
            <option th:each="est : ${intervencionEstados}" 
                    th:value="${est.estado}"
                    th:text="${est.estado}">
            </option>
        </select>

        <button type="submit">Guardar</button>

    </form>
</body>
</html>
