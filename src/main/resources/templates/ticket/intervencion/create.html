<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Intervención</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-dark text-white">
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-4" style="width:100%; max-width:500px; background-color:#2D2D2D; border-color:#4A90E2;">
            <h2 class="card-title text-center text-white mb-4">Crear Intervención</h2>
            <form th:action="@{/intervencion/create}" th:object="${intervencion}" method="post" novalidate>
                <input type="hidden" th:field="*{ticketId}" />

                <!-- Descripción -->
                <div class="mb-3">
                    <label for="descripcion" class="form-label text-white">Descripción</label>
                    <input type="text" th:field="*{descripcion}" id="descripcion" class="form-control bg-dark text-white" placeholder="Ingrese una descripción" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
                </div>

                <!-- Estado -->
                <div class="mb-3">
                    <label for="estado" class="form-label text-white">Estado</label>
                    <select th:field="*{estado}" id="estado" class="form-select bg-dark text-white" required>
                        <option value="">Seleccione un estado</option>
                        <option th:each="est : ${intervencionEstados}" 
                                th:value="${est.estado}"
                                th:text="${est.estado}">
                        </option>
                    </select>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></div>
                </div>

                <!-- Botones -->
                <button type="submit" class="btn btn-primary w-100 mb-2">Guardar</button>
                <a th:href="@{/home}" class="btn btn-secondary w-100">Volver</a>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
