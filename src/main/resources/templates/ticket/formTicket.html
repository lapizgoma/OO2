<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Ticket</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="container min-vh-100 d-flex justify-content-center align-items-center">
        <div class="card p-4" style="width: 100%; max-width: 500px; background-color: #2D2D2D; border-color: #4A90E2;">
            <h1 class="card-title text-center text-white mb-4">Crear Ticket</h1>
            <form th:action="@{/ticket/create}" th:object="${ticket}" method="post">
                <div class="mb-3">
                    <h3 class="text-white-50 mb-2">Problemas con su ticket</h3>
                    <label for="asunto" class="form-label text-white">Asunto</label>
                    <input type="text" th:field="*{asunto}" id="asunto" class="form-control bg-dark text-white" placeholder="Ingrese el asunto" required>
                </div>
                <div class="mb-3">
                    <label for="mensaje" class="form-label text-white">Mensaje</label>
                    <textarea name="mensaje" id="mensaje" class="form-control bg-dark text-white" rows="5" placeholder="Describa el problema" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-2">Crear Ticket</button>
                <a th:href="@{/cliente/home}" class="btn btn-secondary w-100">Volver</a>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
