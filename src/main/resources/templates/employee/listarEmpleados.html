<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Lista de Empleados</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Google Fonts: Inter -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Sistema de Tickets UNLa - Admin</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item me-2">
                        <a class="btn btn-primary" th:href="@{/home}">Ver Tickets</a>
                    </li>
            <li class="nav-item">
              <form th:action="@{/auth/logout}" method="post" class="d-inline">
                <button
                  type="submit"
                  class="nav-link btn btn-logout text-white">
                  Logout
                </button>
              </form>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Cuerpo de la página -->
    <div class="container mt-5">
      <!-- Título y botón "Agregar" en la misma fila -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-white">Lista de Empleados</h1>
        <a th:href="@{/empleados/agregar}" class="btn btn-primary">Agregar</a>
      </div>

      <div class="row row-cols-1 row-cols-md-2 g-4">
        <div th:each="empleado : ${empleados}" class="col">
          <div
            class="employee-card p-3"
            data-email="${empleado.email}"
          >
            <h5 class="text-primary mb-2">
              [[${empleado.nombre}]] [[${empleado.apellido}]]
            </h5>
            <p class="text-white-50 mb-1">DNI: [[${empleado.dni}]]</p>
            <p class="text-white-50 mb-1">Legajo: [[${empleado.nroLegajo}]]</p>
            <a class="btn btn-link p-0 text-decoration-none" data-bs-toggle="collapse" th:href="'#detalleEmpleado' + ${empleado.id}" role="button" aria-expanded="false" th:aria-controls="'detalleEmpleado' + ${empleado.id}">
      Más...
    </a>

    <div class="collapse mt-3" th:id="'detalleEmpleado' + ${empleado.id}">
      <hr />
      <p class="card-text mb-1"><strong>Email:</strong> <span th:text="${empleado.email}"></span></p>
      <p class="card-text mb-1"><strong>Teléfono:</strong> <span th:text="${empleado.telefono}"></span></p>
      <p class="card-text mb-1">
        <strong>Dirección:</strong>
        <span th:text="${empleado.direccionCompleta}"></span>
      </p>
    </div>
            <form
              th:action="@{/empleados/{id}(id=${empleado.id})}"
              method="post"
              class="mt-2"
            >
              <input type="hidden" name="_method" value="put" />
              <button type="submit" class="btn btn-danger w-100">
                Dar de Baja
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
