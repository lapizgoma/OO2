<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Panel Cliente - Sistema de Tickets UNLa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">Bienvenido, <a th:href="@{/cuenta/perfil}"><span th:text="${#authentication.principal.nombre}">Usuario</span>!</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item me-2">
                        <a class="btn btn-primary" th:href="@{/ticket/create}">Crear Ticket</a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/auth/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-logout">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
        <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensajeExito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="container mt-5">
        <h1 class="mb-4 text-center">Historial de Tickets</h1>
        <div th:if="${tickets != null && !tickets.isEmpty()}">
            <div class="d-flex flex-wrap justify-content-center gap-4">
                <div class="ticket-card-wrapper" th:each="ticket : ${tickets}">
                    <a th:href="@{'/ticket/' + ${ticket.id}}" style="text-decoration:none; color:inherit;">
                        <div class="ticket-card">
                            <div class="ticket-header">
                                <h5 class="card-title mb-0">Ticket #<span th:text="${ticket.id}"></span> <span class="ms-2" th:text="${ticket.asunto}"></span></h5>
                            </div>
                            <div class="ticket-details">
                                 <div class="ticket-detail"><strong>Detalle:</strong> <span th:text="${ticket.detalle}"></span></div>
                                <div class="ticket-detail"><strong>Estado:</strong> <span th:text="${ticket.estado}"></span></div>
                                <div class="ticket-detail"><strong>Fecha:</strong> <span th:text="${ticket.fechaHoraCreado}"></span></div>
                                <div class="ticket-detail-label mt-2">Última intervención: <span class="ticket-detail-content text-white-50" th:if="${ticket.intervenciones.isEmpty()}">Sin intervenciones</span></div>
                                <div class="ticket-detail-content" th:if="${ticket.ultimaIntervencion != null}"
                                     th:text="${ticket.ultimaIntervencion.descripcion} + ' - ' + ${ticket.ultimaIntervencion.estado}"></div>  
                                </div>
                                
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
        <div th:if="${tickets == null || tickets.isEmpty()}">
            <div class="alert alert-info text-center">No tienes tickets registrados.</div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
