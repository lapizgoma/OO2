<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <!-- El formulario sigue usando th:object para cliente -->
    <form th:action="@{/cuenta/editar}" th:object="${cliente}" method="post">
        <h1>Editar Perfil</h1>
        
        <input type="hidden" id="password" th:field="*{password}">
        <input type="hidden" id="dni" th:field="*{dni}">
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" th:field="*{nombre}">
        </div>

        <div>
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" th:field="*{apellido}">
        </div>

        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{contacto.email}">
        </div>

        <div>
            <label for="telefono">Teléfono:</label>
            <input type="text" id="telefono" th:field="*{contacto.telefono}">
        </div>

        <div>
            <label for="calle">Calle:</label>
            <input type="text" id="calle" th:field="*{contacto.calle}">
        </div>

        <div>
            <label for="nroPuerta">Número de Puerta:</label>
            <input type="text" id="nroPuerta" th:field="*{contacto.nroPuerta}">
        </div>

        <div>
            <label for="localidad">Localidad:</label>
            <input type="text" id="localidad" th:field="*{contacto.localidad}">
        </div>

        <div th:if="${cliente.organizacion == null}">
            <label for="codigoAcceso">Código de acceso:</label>
                <input type="text" id="codigoAcceso" name="codigoAcceso"
                th:value="${codigoAcceso}" />
            <div th:if="${codigoError}" class="text-danger small mt-1" th:text="${codigoError}"></div>
        </div>
        
        <a th:href="@{/cuenta/eliminar}" class="btn btn-danger" role="button">Eliminar Cuenta</a>
        <a th:href="@{/home}" class="btn btn-secondary" role="button">Volver</a>
        <button type="submit">Guardar Cambios</button>
    </form>
</body>
</html>
