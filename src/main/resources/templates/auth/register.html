<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrarse</title>
  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <!-- Google Font: Inter -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <!-- CSS personalizado -->
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4" style="width:100%; max-width:500px; background-color:#2D2D2D; border-color:#4A90E2;">
      <h2 class="card-title text-center text-white mb-4">Registrarse</h2>

      <form th:action="@{/auth/register}" th:object="${cliente}" method="post">
                <!-- Nombre -->
        <div class="mb-3">
          <label for="nombre" class="form-label text-white">Nombre</label>
          <input
            type="text"
            th:field="*{nombre}"
            id="nombre"
            class="form-control bg-dark text-white"
            placeholder="Ingrese su nombre"
          />
          <div class="text-danger small mt-1"
              th:if="${#fields.hasErrors('nombre')}"
              th:errors="*{nombre}"></div>
        </div>

        <!-- Apellido -->
        <div class="mb-3">
          <label for="apellido" class="form-label text-white">Apellido</label>
          <input
            type="text"
            th:field="*{apellido}"
            id="apellido"
            class="form-control bg-dark text-white"
            placeholder="Ingrese su apellido"
          />
          <div class="text-danger small mt-1"
              th:if="${#fields.hasErrors('apellido')}"
              th:errors="*{apellido}"></div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label text-white">Email</label>
          <input
            type="email"
            th:field="*{contacto.email}"
            id="email"
            class="form-control bg-dark text-white"
            placeholder="usuario@ejemplo.com"
          />
          <div class="text-danger small mt-1"
              th:if="${#fields.hasErrors('contacto.email')}"
              th:errors="*{contacto.email}"></div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="form-label text-white">Contraseña</label>
          <input
            type="password"
            th:field="*{password}"
            id="password"
            class="form-control bg-dark text-white"
            placeholder="••••••••"
          />
          <div class="text-danger small mt-1"
              th:if="${#fields.hasErrors('password')}"
              th:errors="*{password}"></div>
        </div>

        <!-- DNI -->
        <div class="mb-3">
          <label for="dni" class="form-label text-white">DNI</label>
          <input
            type="text"
            th:field="*{dni}"
            id="dni"
            class="form-control bg-dark text-white"
            placeholder="Ingrese su DNI"
          />
          <div class="text-danger small mt-1"
              th:if="${#fields.hasErrors('dni')}"
              th:errors="*{dni}"></div>
        </div>

        <!-- Contacto: Calle -->
        <div class="mb-3">
          <label for="calle" class="form-label text-white">Calle</label>
          <input
            type="text"
            th:field="*{contacto.calle}"
            id="calle"
            class="form-control bg-dark text-white"
            placeholder="Nombre de la calle"
          />
          <div class="text-danger small mt-1"
              th:if="${#fields.hasErrors('contacto.calle')}"
              th:errors="*{contacto.calle}"></div>
        </div>

        <!-- Contacto: Número de puerta -->
        <div class="mb-3">
          <label for="nro_puerta" class="form-label text-white">Número de puerta</label>
          <input
            type="text"
            th:field="*{contacto.nroPuerta}"
            id="nro_puerta"
            class="form-control bg-dark text-white"
            placeholder="e.g. 123"
          />
          <div class="text-danger small mt-1"
              th:if="${#fields.hasErrors('contacto.nroPuerta')}"
              th:errors="*{contacto.nroPuerta}"></div>
        </div>

        <!-- Contacto: Localidad -->
        <div class="mb-3">
          <label for="localidad" class="form-label text-white">Localidad</label>
          <input
            type="text"
            th:field="*{contacto.localidad}"
            id="localidad"
            class="form-control bg-dark text-white"
            placeholder="Ciudad / Barrio"
          />
          <div class="text-danger small mt-1"
              th:if="${#fields.hasErrors('contacto.localidad')}"
              th:errors="*{contacto.localidad}"></div>
        </div>

        <!-- Contacto: Teléfono -->
        <div class="mb-3">
          <label for="telefono" class="form-label text-white">Teléfono</label>
          <input
            type="tel"
            th:field="*{contacto.telefono}"
            id="telefono"
            class="form-control bg-dark text-white"
            placeholder="e.g. 1123456789"
          />
          <div class="text-danger small mt-1"
              th:if="${#fields.hasErrors('contacto.telefono')}"
              th:errors="*{contacto.telefono}"></div>
        </div>

        <!-- Persona Jurídica -->
        <div class="form-check form-switch text-white mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            name="activo"
            id="esJuridica"
            th:checked="${activo}"
            onclick="toggleCodigoAcceso()"
          />
          <label class="form-check-label" for="esJuridica">Es persona jurídica</label>
        </div>

        <!-- Código de acceso (solo visible si es persona jurídica) -->
        <div class="mb-3" id="codigoAccesoDiv" style="display:none;">
          <label for="codigoAcceso" class="form-label text-white">Código de acceso</label>
          <input
            type="text"
            th:field="*{organizacion.codigoAcceso}"
            id="codigoAcceso"
            class="form-control bg-dark text-white"
            placeholder="00-00000000-0"
          />
          <div class="text-danger small mt-1"
              th:if="${#fields.hasErrors('organizacion.codigoAcceso')}"
              th:errors="*{organizacion.codigoAcceso}"></div>
        </div>

        <!-- Botones -->
        <button type="submit" class="btn btn-primary w-100 mb-2">Registrarse</button>
        <a th:href="@{/home}" class="btn btn-secondary w-100">Volver</a>
      </form>
    </div>
  </div>

    <script>
  function toggleCodigoAcceso() {
    const check = document.getElementById('esJuridica');
    const div = document.getElementById('codigoAccesoDiv');
    div.style.display = check.checked ? 'block' : 'none';
  }
  // Mostrar el campo si ya estaba tildado al volver con errores
  window.onload = function() {
    toggleCodigoAcceso();
  }
</script>
  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
</body>
</html>
