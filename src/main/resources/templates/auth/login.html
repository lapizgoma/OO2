<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar Sesión</title>
  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <!-- Google Font: Inter -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <!-- CSS personalizado -->
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="card p-4" style="width: 100%; max-width: 400px; background-color: #2D2D2D; border-color: #4A90E2;">
      <h2 class="card-title text-center text-white mb-4">Iniciar Sesión</h2>

      <!-- Mensaje de error -->
      <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

      <form th:action="@{/auth/loginProcess}" th:object="${personaJuridica}" method="post" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label text-white">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            class="form-control bg-dark text-white"
            placeholder="usuario@ejemplo.com"
            required
          />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label text-white">Contraseña</label>
          <input
            type="password"
            name="password"
            id="password"
            class="form-control bg-dark text-white"
            placeholder="Password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-2">Iniciar Sesión</button>
      </form>

      <div class="text-center">
        <a th:href="@{/home}" class="text-white-50 me-3">Volver</a>
        <a th:href="@{/auth/register}" class="text-white-50">Registrarse</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap Bundle JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
</body>
</html>
