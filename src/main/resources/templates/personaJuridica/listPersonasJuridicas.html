<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Persona Jurídica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/home}">Sistema de Tickets UNLa - Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item me-2">
                        <a class="btn btn-primary" th:href="@{/grupo/crear}">Añadir Persona Jurídica</a>
                    </li>
                    <li class="nav-item me-2">
                        <a class="btn btn-primary" th:href="@{/employee}">Ver Empleados</a>
                    </li>
                    <li class="nav-item me-2">
                        <a class="btn btn-primary" th:href="@{/home}">Ver Tickets</a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/auth/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-logout">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="mb-4 text-center">Lista de Personas Jurídicas</h1>
        <div th:if="${personasJuridicas != null && !personasJuridicas.isEmpty()}">
            <div class="d-flex flex-wrap justify-content-center gap-4">
                <div class="ticket-card-wrapper" th:each="persona : ${personasJuridicas}">
                    <a th:href="@{'/grupo/ver/' + ${persona.codigoAcceso}}"
                        style="text-decoration:none; color:inherit;">
                        <div class="ticket-card">
                            <div class="ticket-header">
                                <h5 class="card-title mb-0"><span th:text="${persona.razonSocial}"></span></h5>
                            </div>
                            <div class="ticket-details">
                                <div class="ticket-detail"><strong>Razón Social:</strong> <span
                                        th:text="${persona.razonSocial}"></span></div>
                                <div class="ticket-detail"><strong>CUIT:</strong> <span
                                        th:text="${persona.cuit}"></span>
                                </div>
                                <div class="ticket-detail"><strong>Código de Acceso:</strong> <span
                                        th:text="${persona.codigoAcceso}"></span></div>
                                <form th:action="@{/grupo/borrar/{id}(id=${persona.codigoAcceso})}" method="post"
                                    class="mt-2">
                                    <input type="hidden" name="_method" value="post" />
                                    <button type="submit" class="btn btn-danger w-100">
                                        Eliminar
                                    </button>
                                </form>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>


</body>
